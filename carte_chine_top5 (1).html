<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP 5 Pneumatique Chinois — Carte des pôles industriels</title>
<style>
  body { margin: 0; padding: 24px; background: #f9f8f5; font-family: 'Segoe UI', Arial, sans-serif; }
  h1 { font-size: 17px; font-weight: 500; color: #2c2c2a; margin: 0 0 4px 0; }
  p.sub { font-size: 13px; color: #888; margin: 0 0 16px 0; }
  #map { background: white; border: 0.5px solid #ddd; border-radius: 8px; overflow: hidden; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 12px; color: #555; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .note { font-size: 11px; color: #aaa; margin-top: 10px; font-style: italic; }
</style>
</head>
<body>
<h1>TOP 5 Pneumatique Chinois — Pôles industriels domestiques</h1>

<div id="map"></div>
<div class="legend">
  <span><span class="dot" style="background:#185FA5"></span>Linglong</span>
  <span><span class="dot" style="background:#0F6E56"></span>Sailun</span>
  <span><span class="dot" style="background:#993C1D"></span>ZC Rubber</span>
  <span><span class="dot" style="background:#D85A30"></span>Double Star</span>
  <span><span class="dot" style="background:#444441"></span>Double Coin</span>
</div>
<p class="note">Bases offshore (Thaïlande, Vietnam, Cambodge, Serbie, Indonésie, Mexique) non représentées sur cette carte.</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const W = 720, H = 500;
const svg = d3.select('#map').append('svg')
  .attr('viewBox', `0 0 ${W} ${H}`)
  .attr('width', '100%')
  .style('background', 'white');

const proj = d3.geoMercator().center([108, 36]).scale(660).translate([W/2 - 20, H/2 + 10]);
const path = d3.geoPath(proj);

const secondary = [
  { name:'Dezhou — Linglong (TBR, 8M pneus/an)',      lat:37.45, lon:116.36, co:'#185FA5', r:6 },
  { name:'Liuzhou/Guangxi — Linglong (5M/an)',         lat:24.33, lon:109.42, co:'#185FA5', r:6 },
  { name:'Dongying — Sailun (TBR, base 2)',            lat:37.46, lon:118.67, co:'#0F6E56', r:6 },
  { name:'Shenyang — Sailun (PCR+TBR, hub Nord-Est)', lat:41.80, lon:123.43, co:'#0F6E56', r:6 },
  { name:'Jiande — ZC Rubber (Usine Verte 2023)',      lat:29.47, lon:119.27, co:'#993C1D', r:6 },
  { name:'Tianjin — ZC Rubber (base 3)',               lat:39.08, lon:117.20, co:'#993C1D', r:6 },
  { name:'Shiyan/Hubei — Double Star (TBR poids lourds)', lat:32.64, lon:110.78, co:'#D85A30', r:6 },
  { name:'Jiangsu — Double Coin (TBR, 3,3M/an)',       lat:32.06, lon:118.79, co:'#444441', r:6 },
  { name:'Anhui/Wuhu — Double Coin (PCR Warrior)',     lat:31.33, lon:118.36, co:'#444441', r:6 },
  { name:'Chongqing — Double Coin (TBR, 2,5M/an)',     lat:29.56, lon:106.55, co:'#444441', r:6 },
  { name:'Zhaoyuan — Linglong R&D (Intelligent Mfg + IoT)', lat:37.20, lon:120.25, co:'#185FA5', r:5, rd:true },
  { name:'Qingdao — Sailun R&D (Centre national caoutchouc et pneus)', lat:35.88, lon:120.05, co:'#0F6E56', r:5, rd:true },
  { name:'Hangzhou — ZC Rubber R&D (5G+IA, Usine du Futur)', lat:30.38, lon:120.52, co:'#993C1D', r:5, rd:true },
  { name:'Shanghai — Double Coin R&D (上海轮胎研究所)', lat:31.40, lon:121.28, co:'#444441', r:5, rd:true },
  { name:'Qingdao — Double Star R&D (Wheel Cloud, centre design)', lat:36.72, lon:120.52, co:'#D85A30', r:5, rd:true },
];

const primary = [
  { name:'Zhaoyuan — Linglong (siège, 12M pneus/an)', lat:37.35, lon:120.55, co:'#185FA5', r:10 },
  { name:'Qingdao — Double Star (siège, usine 4.0)',  lat:36.45, lon:120.72, co:'#D85A30', r:9 },
  { name:'Qingdao — Sailun (siège, OTR 49-63 pouces)', lat:36.18, lon:120.40, co:'#0F6E56', r:10 },
  { name:'Hangzhou — ZC Rubber (siège, IPO 2025)',    lat:30.26, lon:120.15, co:'#993C1D', r:10 },
  { name:'Shanghai — Double Coin (siège Huayi)',       lat:31.23, lon:121.55, co:'#444441', r:9 },
];

d3.json('https://cdn.jsdelivr.net/npm/datamaps@0.5.10/src/js/data/chn.topo.json').then(data => {
  const features = topojson.feature(data, data.objects.chn).features;

  svg.selectAll('path.province')
    .data(features).join('path')
    .attr('class','province')
    .attr('d', path)
    .attr('fill', '#e8e4dc')
    .attr('stroke', '#fff')
    .attr('stroke-width', 0.6);

  const tipG = svg.append('g').style('display','none').style('pointer-events','none');
  const tipRect = tipG.append('rect').attr('rx',6)
    .attr('fill','white').attr('stroke','#bbb').attr('stroke-width',0.8);
  const tipText = tipG.append('text').attr('font-size',13).attr('font-family','Segoe UI, Arial, sans-serif');

  function showTip(x, y, label, color) {
    tipText.selectAll('*').remove();
    tipText.append('tspan').attr('x',12).attr('y',22)
      .attr('fill', color).attr('font-weight','600').text(label);
    const bb = tipText.node().getBBox();
    const tw = bb.width + 24, th = 36;
    tipRect.attr('width', tw).attr('height', th);
    let tx = x + 16, ty = y - th - 10;
    if (tx + tw > W - 4) tx = x - tw - 16;
    if (ty < 4) ty = y + 14;
    tipG.attr('transform', `translate(${tx},${ty})`).style('display', null);
  }

  function drawDots(list) {
    list.forEach(s => {
      const [x, y] = proj([s.lon, s.lat]);
      const g = svg.append('g').style('cursor','pointer');
      g.append('circle').attr('cx',x).attr('cy',y).attr('r', s.r + 6).attr('fill','transparent');
      g.append('circle').attr('cx',x).attr('cy',y).attr('r', s.r)
        .attr('fill', s.co).attr('fill-opacity', 0.88)
        .attr('stroke','white').attr('stroke-width', 1.8);
      g.on('mouseover', () => showTip(x, y, s.name, s.co))
       .on('mouseout',  () => tipG.style('display','none'));
    });
  }

  drawDots(secondary);
  drawDots(primary);
  tipG.raise();

}).catch(err => {
  svg.append('text').attr('x',W/2).attr('y',H/2)
    .attr('text-anchor','middle').attr('fill','#888').attr('font-size',14)
    .text('Erreur de chargement de la topologie — vérifiez votre connexion.');
});
</script>
</body>
</html>
